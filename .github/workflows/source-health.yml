name: source-health

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-health-${{ github.repository }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  check-source-health:
    name: Check live source health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate live source URLs
        run: >-
          python3 mlx-model-porting/scripts/validate_sources.py mlx-model-porting
          --check-urls --timeout 15 --workers 8
          --output "$RUNNER_TEMP/source-health-report.json"
      - name: Upload source-health report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-health-report
          path: ${{ runner.temp }}/source-health-report.json
          if-no-files-found: error
          retention-days: 14
