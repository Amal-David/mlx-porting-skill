name: daily-research-candidates

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python3 -m pip install --disable-pip-version-check numpy
      - name: Collect review-only candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 mlx-model-porting/scripts/update_sources.py \
            --output mlx-model-porting/assets/update-candidates.json
      - name: Validate package
        run: |
          python3 mlx-model-porting/scripts/audit_skill.py --strict mlx-model-porting
          python3 mlx-model-porting/scripts/validate_sources.py mlx-model-porting
          PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -v
      - name: Open or update review PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- mlx-model-porting/assets/update-candidates.json; then
            echo "No candidate diff"
            exit 0
          fi
          branch="automation/daily-mlx-research"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add mlx-model-porting/assets/update-candidates.json
          git commit -m "chore: refresh MLX research candidates"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "Daily MLX research candidates" \
            --body "Review-only source changes. This workflow does not modify runbooks, technique status, or merge automatically." \
          || gh pr edit "$branch" \
            --title "Daily MLX research candidates" \
            --body "Review-only source changes. This workflow does not modify runbooks, technique status, or merge automatically."
