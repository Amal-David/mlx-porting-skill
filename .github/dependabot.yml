version: 2
updates:
  # Keep pinned GitHub Actions (all pinned to full commit SHAs) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    # Honour the repository's 7-day supply-chain cooldown before proposing a
    # freshly published release.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  # Refresh the hash-locked CI Python requirements under .github/.
  - package-ecosystem: "pip"
    directory: "/.github"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 7
